<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="健康カルテ">
  <title>健康カルテ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="top">
      <div>
        <h1>健康カルテ</h1>
        <p>Ver.14 安定版</p>
      </div>
      <button id="settingsBtn" class="iconBtn" type="button">並替</button>
    </header>

    <section class="topWeight card">
      <div class="cardLabel">前回の体重</div>
      <div class="weightLine">
        <span id="latestWeight">未記録</span>
        <small id="latestWeightUnit"></small>
      </div>
      <div id="latestWeightTime" class="hint">体重を記録すると表示されます</div>
    </section>

    <section class="aiCard card">
      <div class="aiHead">
        <div class="aiScore" id="aiScore">--</div>
        <div>
          <div class="cardLabel">AI健康診断</div>
          <div id="aiComment" class="aiComment">今日の記録を入力すると表示されます。</div>
        </div>
      </div>
    </section>

    <main id="categoryList"></main>

    <section class="card summaryCard">
      <h2>今日の集計</h2>
      <div id="summaryPills" class="pills"></div>
      <div id="recordList" class="recordList"></div>
    </section>

    <section class="card sendCard">
      <h2>ChatGPTへ送信</h2>
      <textarea id="sendText" readonly></textarea>
      <div class="btnRow">
        <button id="copyBtn" class="mainBtn" type="button">コピー</button>
        <button id="exportBtn" class="subBtn" type="button">保存</button>
        <button id="clearTodayBtn" class="subBtn dangerBtn" type="button">今日削除</button>
      </div>
    </section>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modalBox">
      <div class="modalHead">
        <h2>カテゴリー並び替え</h2>
        <button id="closeModal" class="iconBtn" type="button">閉じる</button>
      </div>
      <p class="hint">↑↓で好きな位置に移動できます。並び順は自動保存されます。</p>
      <div id="orderList" class="orderList"></div>
      <button id="resetOrderBtn" class="subBtn full" type="button">初期順に戻す</button>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
