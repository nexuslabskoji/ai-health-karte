<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>AI健康カルテ Ver.12.2</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#06111d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="AI健康カルテ">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
<div class="app" id="top">
<header>
  <div class="top">
    <div class="brand">
      <img src="apple-touch-icon.png" class="logo" alt="">
      <span>NEXUS LAB</span>
    </div>
    <div class="clockBox">
      <div id="clock">--:--:--</div>
      <div id="dateText">----年--月--日（-）</div>
    </div>
  </div>
  <div class="titleRow">
    <h1>AI健康カルテ</h1>
    <div class="ver">Ver.12.2</div>
  </div>
  <div class="sub">あなたの健康を、科学と優しさでサポート</div>
</header>

<main>
  <div class="quick">
    <div class="q"><div class="emoji">⚖️</div><div class="label">前回体重</div><div class="num" id="qWeight">未記録</div></div>
    <div class="q"><div class="emoji">❤️</div><div class="label">血圧</div><div class="num" id="qBp">未記録</div></div>
    <div class="q"><div class="emoji">🩸</div><div class="label">血糖値</div><div class="num" id="qGlucose">未記録</div></div>
    <div class="q"><div class="emoji">🚽</div><div class="label">排尿回数</div><div class="num" id="qUrineCount">0回</div></div>
    <div class="q"><div class="emoji">🚽</div><div class="label">総尿量</div><div class="num" id="qUrineMl">0mL</div></div>
    <div class="q"><div class="emoji">🥤</div><div class="label">飲水量</div><div class="num" id="qWaterMl">0mL</div></div>
    <div class="q"><div class="emoji">💩</div><div class="label">排便</div><div class="num" id="qBowel">0回</div></div>
    <div class="q"><div class="emoji">🔥</div><div class="label">カロリー</div><div class="num" id="qCal">0kcal</div></div>
    <div class="q"><div class="emoji">💊</div><div class="label">服薬</div><div class="num" id="qMed">0回</div></div>
  </div>

  <section class="card">
    <h2>🤖 AI健康診断</h2>
    <div id="aiBox" class="aiBox">今日の記録を入力すると表示されます。</div>
  </section>

  <div id="categoryArea"></div>

  <section class="card">
    <h2>🔀 並び替え</h2>
    <div class="hint">↑↓でカテゴリーの位置を変更できます。順番は自動保存されます。</div>
    <div id="orderList"></div>
  </section>

  <section class="card">
    <h2>📋 記録一覧</h2>
    <div id="records" class="records"></div>
  </section>

  <section class="card">
    <h2>📊 集計結果</h2>
    <div id="result" class="resultBox">集計ボタンを押すと表示されます。</div>
  </section>
</main>
</div>

<button class="topBtn" onclick="scrollToTop()">↑上へ</button>
<div class="bottomBar">
  <button class="sumBtn" onclick="makeSummary()">集計</button>
  <button class="copyBtn" onclick="copySummary()">コピー</button>
  <button class="clearBtn" onclick="clearToday()">今日を削除</button>
</div>
<div id="toast"></div>
<script src="script.js"></script>
</body>
</html>
